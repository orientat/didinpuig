<!DOCTYPE html>
<html lang="ca">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orienta't</title>

<link rel="icon" type="image/png" href="favicon.png">
<link rel="shortcut icon" href="favicon.png">

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:#ffffff;
}

/* CONTENEDOR GENERAL */

.wrapper{
width:75%;
margin:auto;
}

/* SELECTOR IDIOMA */

.lang{
width:75%;
margin:auto;
display:flex;
justify-content:flex-end;
gap:15px;
padding-top:15px;
flex-wrap:wrap;
}

.lang a{
background:#6d2548;
color:white;
padding:6px 30px;
border-radius:25px;
font-size:15px;
font-weight:bold;
text-decoration:none;
display:inline-block;
text-align:center;
}

.lang a:hover{
background:#a65277;
}

/* IMÁGENES */

.logo img,
.footer img{
width:100%;
height:auto;
display:block;
margin-top:10px;
}

/* BANNER */

.header-img{
margin-top:20px;
position:relative;
margin-bottom:80px;
}

.header-img img{
width:100%;
height:420px;
object-fit:cover;
object-position:center;
display:block;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.15);
border:1px solid #eee;
}

/* BOTÓN ORIENTALINE */

.boton-orientaline{
position:absolute;
bottom:-20px;       /* un poco más arriba */
left:45%;           /* desplazado a la izquierda */
}

.boton-orientaline img{
width:340px;
height:auto;
transition:transform .2s ease, filter .2s ease;
}

.boton-orientaline img:hover{
transform:scale(1.08);
filter:brightness(1.05);
}

/* TITULO */

h2{
text-align:center;
margin:40px 0;
color:#5b2140;
font-size:32px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:25px;
}

/* TARJETAS */

.card{
background:#a65277;
color:white;
border-radius:28px;
padding:20px;
text-align:center;
border:4px solid #6d2548;
display:flex;
flex-direction:column;
justify-content:space-between;
min-height:160px;
transition:transform .2s;
}

.card:hover{
transform:scale(1.05);
}

.card-title{
font-size:18px;
font-weight:bold;
margin-bottom:15px;
min-height:45px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.card-button{
background:white;
color:#6d2548;
padding:8px 16px;
border-radius:30px;
font-weight:bold;
display:inline-block;
font-size:14px;
}

a{
text-decoration:none;
}

/* RESPONSIVE */

@media (max-width:1200px){

.wrapper,
.lang{
width:85%;
}

.grid{
grid-template-columns:repeat(4,1fr);
}

.header-img img{
height:320px;
}

.boton-orientaline{
left:44%;
}

.boton-orientaline img{
width:260px;
}

}

@media (max-width:800px){

.grid{
grid-template-columns:repeat(3,1fr);
}

.header-img img{
height:260px;
}

.boton-orientaline{
left:42%;
}

.boton-orientaline img{
width:220px;
}

}

@media (max-width:600px){

.wrapper,
.lang{
width:90%;
}

.lang{
justify-content:center;
}

.grid{
grid-template-columns:repeat(2,1fr);
}

.header-img img{
height:220px;
}

.boton-orientaline{
left:40%;
}

.boton-orientaline img{
width:180px;
}

}

</style>

</head>

<body>

<div class="lang">
<a href="index.html">Valencià</a>
<a href="es/index.html">Castellano</a>
</div>

<div class="wrapper">

<div class="logo">
<img src="logo.jpg" alt="Logo centre">
</div>

<div class="header-img">

<img src="foto_orienta_val1.png" alt="Orientació Acadèmica i Professional">

<a class="boton-orientaline" href="https://elorienta.com/movil//?yafxb=06651" target="_blank">
<img src="orientaline_boto.png" alt="Accés a OrientaLine">
</a>

</div>

<h2>ORIENTACIÓ ACADÈMICA</h2>

<div class="grid">

<!-- tus tarjetas siguen igual -->

</div>

<div class="footer">
<img src="footer.jpg" alt="Peu de pàgina">
</div>

</div>

</body>
</html>
