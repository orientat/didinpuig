<!DOCTYPE html>
<html lang="ca">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orienta't</title>

<link rel="icon" type="image/png" href="favicon.png">

<script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:#ffffff;
}

.wrapper{
width:75%;
margin:auto;
}

.lang{
width:75%;
margin:auto;
display:flex;
justify-content:flex-end;
gap:15px;
padding-top:15px;
}

.lang a{
background:#6d2548;
color:white;
padding:6px 30px;
border-radius:25px;
font-weight:bold;
text-decoration:none;
}

.lang a:hover{
background:#a65277;
}

.logo img{
width:100%;
margin-top:10px;
}

.header-img{
margin-top:20px;
margin-bottom:90px;
display:flex;
flex-direction:column;
align-items:center;
position:relative;
}

.header-img img{
width:100%;
height:auto;
max-height:470px;
object-fit:cover;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

.boton-orientaline{
margin-top:-60px;
width:340px;
max-width:80%;
display:block;
position:relative;
border-radius:14px;
overflow:hidden;
transition:transform .3s ease, box-shadow .3s ease;
}

.boton-orientaline:hover{
transform:translateY(-4px);
box-shadow:0 14px 25px rgba(0,0,0,0.35);
}

.boton-orientaline::before{
content:"";
position:absolute;
top:0;
left:-150%;
width:100%;
height:100%;
background:linear-gradient(
120deg,
transparent 30%,
rgba(255,255,255,0.9) 50%,
transparent 70%
);
transform:skewX(-25deg);
animation:shine 5s infinite;
z-index:3;
pointer-events:none;
}

@keyframes shine{
0%{left:-150%;}
60%{left:150%;}
100%{left:150%;}
}

.boton-orientaline img{
width:100%;
height:auto;
display:block;
filter:drop-shadow(0 10px 18px rgba(0,0,0,0.35));
animation:flotar 3s ease-in-out infinite;
position:relative;
z-index:2;
}

@keyframes flotar{
0%{transform:translateY(0);}
50%{transform:translateY(-6px);}
100%{transform:translateY(0);}
}

.orientaline-lateral{
position:fixed;
top:50%;
transform:translateY(-50%);
z-index:999;
pointer-events:none;
opacity:0;
transition:opacity .4s ease;
}

.orientaline-left{ left:-200px; }
.orientaline-right{ right:-200px; }

.orientaline-visible{
opacity:1;
pointer-events:auto;
}

.orientaline-visible.orientaline-left{
animation:slideLeft .6s forwards;
}

.orientaline-visible.orientaline-right{
animation:slideRight .6s forwards;
}

@keyframes slideLeft{ to{ left:10px; } }
@keyframes slideRight{ to{ right:10px; } }

.orientaline-lateral img{
height:420px;
filter:drop-shadow(0 10px 20px rgba(0,0,0,0.35));
}

h2{
text-align:center;
margin:40px 0;
color:#5b2140;
font-size:36px;
letter-spacing:1px;
}

h2::after{
content:"";
display:block;
width:80px;
height:4px;
background:#a65277;
margin:10px auto 0;
border-radius:2px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:30px;
margin-bottom:80px;
}

/* 🔥 CARDS PERFECTAMENT ALINEADES */
.card{
background:linear-gradient(145deg,#b56388,#8f3f63);
color:white;
border-radius:30px;
padding:30px 20px;
border:4px solid #6d2548;
text-align:center;
min-height:200px;

display:flex;
flex-direction:column;
justify-content:space-between; /* clau */
align-items:center;

transition:transform .3s ease, box-shadow .3s ease;
cursor:pointer;
}

.card:hover{
transform:translateY(-10px) scale(1.04);
box-shadow:0 16px 30px rgba(0,0,0,0.30);
}

.card:active{
transform:scale(0.97);
}

.card-icon{
font-size:36px;
margin-bottom:12px;
display:inline-block;
transition:transform .3s ease;
}

.card:hover .card-icon{
animation:iconMove .6s ease;
}

@keyframes iconMove{
0%{transform:translateY(0) rotate(0deg);}
30%{transform:translateY(-8px) rotate(-10deg) scale(1.2);}
60%{transform:translateY(-4px) rotate(8deg) scale(1.1);}
100%{transform:translateY(0) rotate(0deg) scale(1.15);}
}

/* 🔥 TÍTOL CONTROLAT */
.card-title{
font-weight:bold;
margin-bottom:14px;
font-size:15px;

min-height:40px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

/* 🔥 BOTÓ SEMPRE ABAIX */
.card-button{
background:white;
color:#6d2548;
padding:8px 18px;
border-radius:30px;
font-weight:bold;
display:inline-block;
font-size:14px;

margin-top:auto;
}

.creditos{
text-align:center;
font-size:22px;
color:#6d2548;
font-weight:700;
margin-bottom:20px;
}

.contador-area{
display:flex;
justify-content:center;
margin-bottom:40px;
}

.contador-box{
background:#1e1e1e;
color:#00ff90;
font-family:"Courier New", monospace;
font-size:16px;
padding:8px 18px;
border-radius:5px;
letter-spacing:5px;
}

.footer img{
width:100%;
margin-top:10px;
}

/* RESPONSIVE */
@media (max-width:1200px){
.grid{grid-template-columns:repeat(4,1fr);}
.wrapper{width:85%;}
}

@media (max-width:800px){
.grid{grid-template-columns:repeat(3,1fr);}
}

@media (max-width:600px){
.grid{grid-template-columns:repeat(2,1fr);}
.wrapper{width:90%;}
}

@media (max-width:900px){
.orientaline-lateral{display:none;}
}

</style>
</head>

<body>

<div class="wrapper">

<h2>ORIENTACIÓ ACADÈMICA</h2>

<div class="grid">

<a href="#"><div class="card"><div class="card-icon">🏫</div><div class="card-title">Transició de Primària</div><div class="card-button">Consulta informació</div></div></a>

<a href="#"><div class="card"><div class="card-icon">📘</div><div class="card-title">Estàs en 1r d'ESO</div><div class="card-button">Guia de l’alumnat</div></div></a>

<a href="#"><div class="card"><div class="card-icon">📗</div><div class="card-title">Estàs en 2n d'ESO</div><div class="card-button">Consulta opcions</div></div></a>

<a href="#"><div class="card"><div class="card-icon">📙</div><div class="card-title">Estàs en 3r d'ESO</div><div class="card-button">Rep orientació</div></div></a>

<a href="#"><div class="card"><div class="card-icon">🎓</div><div class="card-title">Estàs en 4t d'ESO</div><div class="card-button">Explora el futur</div></div></a>

<a href="#"><div class="card"><div class="card-icon">🗺️</div><div class="card-title">Estàs en PDC</div><div class="card-button">Consulta el programa</div></div></a>

</div>

</div>

</body>
</html>
