    <style>
        body {

            background: #ffffff;

        }

        /* WRAPPER */
        .wrapper {
            width: 75%;
            margin: auto;
            padding-bottom: 40px;
        }

        /* BOTÓN VOLVER */
        .back {
            margin-top: 20px;
        }

        .back a {
            background: #6d2548;
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.3s ease;
        }

        .back a:hover {
            background: #a65277;
        }

        /* HEADER */
        header {
            background: #a65277;
            color: white;
            text-align: center;
            padding: 25px;
            margin-top: 15px;
            border-radius: 10px;
        }

        header h1 {
            margin: 0;
            font-size: 30px;
        }

        header p {
            margin-top: 5px;
            font-size: 14px;
        }

        /* SVG */
        svg {
            width: 100%;
            height: auto;
            margin-top: 40px;
            display: block;
        }

        text {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 14px;
        }

        .title-text {
            font-size: 13px;
        }

        .small-text {
            font-size: 12px;
        }

        /* FOOTER */
        footer {
            background: #a65277;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
            border-radius: 10px;
            width: 75%;
            margin-left: auto;
            margin-right: auto;
        }

</head>
